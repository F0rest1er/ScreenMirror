<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция экрана</title>
    <link rel="stylesheet" href="/mobile/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="viewer-page">
    <div class="viewer-layout">
        <header class="viewer-header">
            <h1 class="viewer-header__title">Трансляция macOS</h1>
            <button class="viewer-header__btn" id="fullScreenBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 5h5v2H7v3H5V5zm14 0h-5v2h3v3h2V5zM5 19h5v-2H7v-3H5v5zm14 0h-5v-2h3v-3h2v5z" fill="currentColor"/>
                </svg>
            </button>
        </header>
        <main class="viewer-content">
            <div class="viewer-content__stream-box">
                <picture class="viewer-content__picture">
                    <img class="viewer-content__video" src="/stream" alt="Трансляция экрана">
                </picture>
            </div>
            <div class="viewer-content__loader">Ожидание потока...</div>
        </main>
    </div>
    <script src="/mobile/script.js"></script>
</body>
</html>
